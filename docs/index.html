<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="PawTube - A clean, distraction-free YouTube experience" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>PawTube</title>
  
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/pawjects/PawTube/refs/heads/main/assets/pawtube_logo.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header" id="header">
      <div class="header-left">
        <button class="icon-btn menu-btn" id="menu-btn" aria-label="Toggle menu">
          <span class="material-symbols-rounded">menu</span>
        </button>
        <a class="logo" href="#/home" data-route="/home">
          <img src="https://raw.githubusercontent.com/pawjects/PawTube/refs/heads/main/assets/pawtube_logo.png" alt="PawTube Logo" class="logo-icon">
          <span class="logo-text">PawTube</span>
        </a>
      </div>

      <div class="header-center" id="header-center">
        <button class="icon-btn mobile-search-back" id="mobile-search-back" aria-label="Back">
          <span class="material-symbols-rounded">arrow_back</span>
        </button>
        <form class="search-bar" id="search-form" action="javascript:void(0);">
          <div class="search-input-wrapper">
            <span class="material-symbols-rounded search-icon-hidden">search</span>
            <input type="search" id="header-search" placeholder="Search videos or paste link" autocomplete="off" />
          </div>
          <button type="submit" class="search-btn" id="search-btn" aria-label="Search">
            <span class="material-symbols-rounded">search</span>
          </button>
        </form>
        <button class="icon-btn voice-search-btn" id="voice-btn" aria-label="Search with your voice">
          <span class="material-symbols-rounded">mic</span>
        </button>
      </div>

      <div class="header-right">
        <button class="icon-btn mobile-search-trigger" aria-label="Search">
          <span class="material-symbols-rounded">search</span>
        </button>
        <button class="icon-btn" id="create-btn" aria-label="Create">
          <span class="material-symbols-rounded">video_call</span>
        </button>
        <button class="icon-btn" id="notif-btn" aria-label="Notifications">
          <span class="material-symbols-rounded">notifications</span>
        </button>
        <button class="profile-btn about-trigger" id="about-btn" aria-label="About PawTube">
          <img src="https://raw.githubusercontent.com/pawjects/PawTube/refs/heads/main/assets/pawtube_logo.png" alt="Profile">
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a class="nav-item active" href="#/home" data-route="/home">
          <span class="material-symbols-rounded nav-icon">home</span>
          <span class="nav-label">Home</span>
        </a>
        <a class="nav-item" href="#/watch" data-route="/watch">
          <span class="material-symbols-rounded nav-icon">play_circle</span>
          <span class="nav-label">Watch</span>
        </a>
        <a class="nav-item" href="#/history" data-route="/history">
          <span class="material-symbols-rounded nav-icon">history</span>
          <span class="nav-label">History</span>
        </a>
        <div class="divider"></div>
        <h3 class="sidebar-heading">You</h3>
        <a class="nav-item" href="#/saved" data-route="/saved">
          <span class="material-symbols-rounded nav-icon">schedule</span>
          <span class="nav-label">Watch Later</span>
        </a>
        <a class="nav-item" href="#/home" data-route="/home">
          <span class="material-symbols-rounded nav-icon">thumb_up</span>
          <span class="nav-label">Liked Videos</span>
        </a>
        <div class="sidebar-footer">
          <p>&copy; 2026 PawTube LLC</p>
        </div>
      </nav>
    </aside>
    
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content" id="main-content" aria-live="polite">
      <div style="padding:40px 24px;color:var(--text-secondary);text-align:center;">Loading PawTube...</div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" id="bottom-nav">
      <a class="bnav-item active" href="#/home" data-route="/home">
        <span class="material-symbols-rounded">home</span>
      </a>
      <a class="bnav-item" href="#/watch" data-route="/watch">
        <span class="material-symbols-rounded">play_circle</span>
      </a>
      <a class="bnav-item mobile-search-trigger" href="javascript:void(0)">
        <span class="material-symbols-rounded">search</span>
      </a>
      <a class="bnav-item" href="#/history" data-route="/history">
        <span class="material-symbols-rounded">history</span>
      </a>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
