name: Bug Report
description: Create a report to help us improve PawTube
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
  - type: input
    id: version
    attributes:
      label: Browser & Version
      description: What browser and version are you using? (e.g., Chrome 120, Firefox 121)
      placeholder: ex. Chrome 120
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: The video player failed to load when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we replicate the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
